<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能温室 IoT 边缘网关 - 实时监控</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    color: #eee;
    min-height: 100vh;
    padding: 20px;
  }
  .header {
    text-align: center;
    margin-bottom: 20px;
  }
  .header h1 {
    font-size: 28px;
    background: linear-gradient(90deg, #00d4ff, #7b2ff7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .status-bar {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin: 15px 0;
    flex-wrap: wrap;
  }
  .status-badge {
    padding: 8px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .status-online {
    background: rgba(0, 255, 136, 0.15);
    color: #00ff88;
    border: 1px solid #00ff88;
  }
  .status-offline {
    background: rgba(255, 68, 68, 0.15);
    color: #ff4444;
    border: 1px solid #ff4444;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }
  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }
  .status-online .status-dot { background: #00ff88; }
  .status-offline .status-dot { background: #ff4444; }

  .alert-banner {
    display: none;
    background: rgba(255, 68, 68, 0.2);
    border: 1px solid #ff4444;
    border-radius: 8px;
    padding: 12px 20px;
    margin: 10px auto;
    max-width: 800px;
    text-align: center;
    color: #ff6666;
    font-weight: 600;
    animation: alertPulse 1s infinite;
  }
  .alert-banner.active { display: block; }
  @keyframes alertPulse {
    0%, 100% { background: rgba(255, 68, 68, 0.2); }
    50% { background: rgba(255, 68, 68, 0.35); }
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 20px;
    margin-bottom: 20px;
  }
  .card {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 15px;
    backdrop-filter: blur(10px);
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .card-title {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-value {
    font-size: 24px;
    font-weight: 700;
    font-family: 'Courier New', monospace;
  }
  .card-value.alert {
    color: #ff4444;
    animation: valuePulse 0.8s infinite;
  }
  @keyframes valuePulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .chart-container {
    position: relative;
    height: 180px;
  }

  .config-panel, .alerts-panel {
    max-width: 800px;
    margin: 20px auto;
  }
  .config-panel h2, .alerts-panel h2 {
    text-align: center;
    margin-bottom: 15px;
    font-size: 20px;
    color: #00d4ff;
  }
  .config-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 12px;
  }
  .config-item {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 8px;
    padding: 10px;
  }
  .config-item label {
    display: block;
    font-size: 12px;
    color: #aaa;
    margin-bottom: 4px;
  }
  .config-item .inputs {
    display: flex;
    gap: 6px;
  }
  .config-item input {
    width: 100%;
    padding: 6px 8px;
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 4px;
    color: #fff;
    font-size: 13px;
  }
  .config-item input:focus {
    outline: none;
    border-color: #00d4ff;
  }
  .config-actions {
    text-align: center;
    margin-top: 15px;
  }
  .btn {
    padding: 10px 30px;
    background: linear-gradient(90deg, #00d4ff, #7b2ff7);
    border: none;
    border-radius: 25px;
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
  }
  .btn:active { transform: translateY(0); }

  .alerts-list {
    max-height: 280px;
    overflow-y: auto;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 8px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.2) transparent;
  }
  .alerts-list::-webkit-scrollbar { width: 6px; }
  .alerts-list::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
  }
  .alert-item {
    padding: 10px 15px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    transition: background 0.3s;
  }
  .alert-item:last-child { border-bottom: none; }
  .alert-item.active {
    background: rgba(255, 68, 68, 0.15);
    border-left: 3px solid #ff4444;
  }
  .alert-item.resolved {
    border-left: 3px solid #00ff88;
  }
  .alert-item.device_offline,
  .alert-item.timeout_offline {
    border-left: 3px solid #ffaa00;
  }
  .alert-item.shutdown {
    border-left: 3px solid #999;
  }
  .alert-sensor {
    font-weight: 600;
  }
  .alert-direction {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    margin-left: 8px;
  }
  .alert-direction.high {
    background: rgba(255, 68, 68, 0.3);
    color: #ff6666;
  }
  .alert-direction.low {
    background: rgba(68, 170, 255, 0.3);
    color: #66aaff;
  }
  .alert-time {
    color: #888;
    font-size: 12px;
  }
  .alert-value {
    font-family: 'Courier New', monospace;
    color: #ff6666;
  }
  .alert-duration {
    color: #888;
    font-size: 12px;
  }
  .no-alerts {
    text-align: center;
    padding: 30px;
    color: #666;
    font-size: 14px;
  }

  .sensor-temp { color: #ff6b6b; }
  .sensor-humidity { color: #4ecdc4; }
  .sensor-light { color: #ffe66d; }
  .sensor-soil { color: #95e1d3; }
  .sensor-co2 { color: #f38181; }

  .toast {
    position: fixed;
    top: 20px;
    right: 20px;
    padding: 12px 20px;
    background: rgba(0,0,0,0.85);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
    z-index: 1000;
    opacity: 0;
    transform: translateX(100%);
    transition: all 0.3s ease;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(0);
  }
  .toast.error {
    border-color: #ff4444;
    color: #ff6666;
  }
</style>
</head>
<body>
  <div id="toast" class="toast"></div>

  <div class="header">
    <h1>🌱 智能温室 IoT 边缘网关 - 实时监控</h1>
    <div class="status-bar">
      <div id="deviceStatus" class="status-badge status-offline">
        <span class="status-dot"></span>
        <span>设备离线</span>
      </div>
      <div class="status-badge" style="background: rgba(0,212,255,0.1); border: 1px solid #00d4ff; color: #00d4ff;">
        <span>刷新间隔: 2s</span>
      </div>
      <div id="alertCount" class="status-badge" style="background: rgba(255,68,68,0.1); border: 1px solid #ff4444; color: #ff4444; display: none;">
        <span>活跃告警: 0</span>
      </div>
    </div>
  </div>

  <div id="alertBanner" class="alert-banner">
    ⚠️ <span id="alertText">传感器数据越界告警</span>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-header">
        <span class="card-title sensor-temp">🌡️ 温度</span>
        <span id="tempValue" class="card-value">-- °C</span>
      </div>
      <div class="chart-container">
        <canvas id="tempChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title sensor-humidity">💧 湿度</span>
        <span id="humidityValue" class="card-value">-- %</span>
      </div>
      <div class="chart-container">
        <canvas id="humidityChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title sensor-light">☀️ 光照</span>
        <span id="lightValue" class="card-value">-- lux</span>
      </div>
      <div class="chart-container">
        <canvas id="lightChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title sensor-soil">🌿 土壤湿度</span>
        <span id="soilValue" class="card-value">-- %</span>
      </div>
      <div class="chart-container">
        <canvas id="soilChart"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title sensor-co2">💨 CO₂</span>
        <span id="co2Value" class="card-value">-- ppm</span>
      </div>
      <div class="chart-container">
        <canvas id="co2Chart"></canvas>
      </div>
    </div>
  </div>

  <div class="card alerts-panel">
    <h2>🚨 告警事件记录</h2>
    <div id="alertsList" class="alerts-list">
      <div class="no-alerts">暂无告警记录</div>
    </div>
  </div>

  <div class="card config-panel">
    <h2>⚙️ 阈值配置（热更新）</h2>
    <div class="config-grid">
      <div class="config-item">
        <label>温度 (°C)</label>
        <div class="inputs">
          <input type="number" id="tempMin" placeholder="最小">
          <input type="number" id="tempMax" placeholder="最大">
        </div>
      </div>
      <div class="config-item">
        <label>湿度 (%)</label>
        <div class="inputs">
          <input type="number" id="humidityMin" placeholder="最小">
          <input type="number" id="humidityMax" placeholder="最大">
        </div>
      </div>
      <div class="config-item">
        <label>光照 (lux)</label>
        <div class="inputs">
          <input type="number" id="lightMin" placeholder="最小">
          <input type="number" id="lightMax" placeholder="最大">
        </div>
      </div>
      <div class="config-item">
        <label>土壤 (%)</label>
        <div class="inputs">
          <input type="number" id="soilMin" placeholder="最小">
          <input type="number" id="soilMax" placeholder="最大">
        </div>
      </div>
      <div class="config-item">
        <label>CO₂ (ppm)</label>
        <div class="inputs">
          <input type="number" id="co2Min" placeholder="最小">
          <input type="number" id="co2Max" placeholder="最大">
        </div>
      </div>
    </div>
    <div class="config-actions">
      <button class="btn" onclick="saveConfig()">保存配置</button>
    </div>
  </div>

<script>
const sensors = ['temperature', 'humidity', 'light', 'soil', 'co2'];
const labelsMap = {
  temperature: '温度', humidity: '湿度', light: '光照', soil: '土壤湿度', co2: 'CO₂'
};
const colorMap = {
  temperature: '#ff6b6b', humidity: '#4ecdc4', light: '#ffe66d',
  soil: '#95e1d3', co2: '#f38181'
};
const unitMap = {
  temperature: '°C', humidity: '%', light: 'lux', soil: '%', co2: 'ppm'
};
const valueIdMap = {
  temperature: 'tempValue', humidity: 'humidityValue',
  light: 'lightValue', soil: 'soilValue', co2: 'co2Value'
};

const charts = {};
const dataPoints = {};
const maxPoints = 60;

sensors.forEach(sensor => {
  dataPoints[sensor] = { labels: [], values: [], alerts: [] };
});

const alertCache = new Map();
let lastAlertCount = 0;

const chartOptions = {
  responsive: true,
  maintainAspectRatio: false,
  animation: { duration: 300 },
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: 'rgba(0,0,0,0.8)',
      titleColor: '#fff',
      bodyColor: '#fff',
      borderColor: 'rgba(255,255,255,0.1)',
      borderWidth: 1
    }
  },
  scales: {
    x: {
      display: true,
      grid: { color: 'rgba(255,255,255,0.05)' },
      ticks: { color: '#888', maxTicksLimit: 5 }
    },
    y: {
      display: true,
      grid: { color: 'rgba(255,255,255,0.05)' },
      ticks: { color: '#aaa' }
    }
  },
  elements: {
    point: { radius: 0, hoverRadius: 5 },
    line: { tension: 0.4, borderWidth: 2 }
  }
};

function createChart(canvasId, sensor) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  const color = colorMap[sensor];

  const gradient = ctx.createLinearGradient(0, 0, 0, 200);
  gradient.addColorStop(0, color + '40');
  gradient.addColorStop(1, color + '00');

  charts[sensor] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: labelsMap[sensor],
        data: [],
        borderColor: color,
        backgroundColor: gradient,
        fill: true,
        pointBackgroundColor: []
      }]
    },
    options: { ...chartOptions }
  });
}

createChart('tempChart', 'temperature');
createChart('humidityChart', 'humidity');
createChart('lightChart', 'light');
createChart('soilChart', 'soil');
createChart('co2Chart', 'co2');

let thresholds = {};

function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString('zh-CN', { hour12: false });
}

function formatDateTime(ts) {
  const d = new Date(ts);
  return d.toLocaleString('zh-CN', { hour12: false });
}

function formatDuration(ms) {
  if (!ms && ms !== 0) return '进行中';
  const s = Math.floor(ms / 1000);
  if (s < 60) return s + '秒';
  const m = Math.floor(s / 60);
  const rs = s % 60;
  return m + '分' + rs + '秒';
}

function showToast(message, type) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.className = 'toast show' + (type ? ' ' + type : '');
  setTimeout(() => {
    toast.className = 'toast' + (type ? ' ' + type : '');
  }, 3000);
}

async function apiRequest(url, options) {
  try {
    const res = await fetch(url, options);
    const data = await res.json();
    if (!data.success) {
      const msg = data.error?.message || '请求失败';
      showToast(msg, 'error');
      throw new Error(msg);
    }
    return data.data;
  } catch (err) {
    if (!err.message.includes('请求失败')) {
      showToast('网络请求失败', 'error');
    }
    throw err;
  }
}

async function fetchLatest() {
  try {
    const data = await apiRequest('/api/latest');

    const statusEl = document.getElementById('deviceStatus');
    if (data.online) {
      statusEl.className = 'status-badge status-online';
      statusEl.querySelector('span:last-child').textContent = '设备在线';
    } else {
      statusEl.className = 'status-badge status-offline';
      statusEl.querySelector('span:last-child').textContent = '设备离线';
    }

    const alertCountEl = document.getElementById('alertCount');
    const activeAlertCount = data.activeAlerts || 0;
    if (activeAlertCount > 0) {
      alertCountEl.style.display = 'flex';
      alertCountEl.querySelector('span').textContent = '活跃告警: ' + activeAlertCount;
    } else {
      alertCountEl.style.display = 'none';
    }

    if (data.thresholds) {
      thresholds = data.thresholds;
    }

    let hasAlert = false;
    const alertSensors = [];

    for (const sensor of sensors) {
      const reading = data.sensors[sensor];
      if (!reading) continue;

      const valueEl = document.getElementById(valueIdMap[sensor]);
      valueEl.textContent = `${reading.value} ${unitMap[sensor]}`;

      if (reading.alert) {
        valueEl.classList.add('alert');
        hasAlert = true;
        alertSensors.push(labelsMap[sensor] + (reading.alertDirection === 'high' ? '过高' : '过低'));
      } else {
        valueEl.classList.remove('alert');
      }

      const dp = dataPoints[sensor];
      dp.labels.push(formatTime(reading.timestamp));
      dp.values.push(reading.value);
      dp.alerts.push(reading.alert);

      if (dp.labels.length > maxPoints) {
        dp.labels.shift();
        dp.values.shift();
        dp.alerts.shift();
      }

      updateChart(sensor);
    }

    const alertBanner = document.getElementById('alertBanner');
    const alertText = document.getElementById('alertText');
    if (hasAlert) {
      alertBanner.classList.add('active');
      alertText.textContent = '告警: ' + alertSensors.join(', ');
    } else {
      alertBanner.classList.remove('active');
    }

    loadAlertEvents();
  } catch (err) {
    // 错误已在 apiRequest 中处理
  }
}

function updateChart(sensor) {
  const chart = charts[sensor];
  const dp = dataPoints[sensor];
  const color = colorMap[sensor];

  chart.data.labels = dp.labels;
  chart.data.datasets[0].data = dp.values;

  const pointColors = dp.alerts.map(alert => alert ? '#ff0000' : color);
  chart.data.datasets[0].pointBackgroundColor = pointColors;
  chart.data.datasets[0].pointRadius = dp.alerts.map(alert => alert ? 5 : 0);

  const hasAlert = dp.alerts.some(a => a);
  chart.data.datasets[0].borderColor = hasAlert ? '#ff4444' : color;

  chart.update('none');
}

async function loadHistory() {
  const now = Date.now();
  const from = now - 5 * 60 * 1000;

  try {
    const data = await apiRequest(`/api/history?from=${from}&to=${now}`);
    const items = data.items;

    const grouped = {};
    sensors.forEach(s => grouped[s] = []);

    items.forEach(item => {
      if (grouped[item.sensor_type]) {
        grouped[item.sensor_type].push(item);
      }
    });

    for (const sensor of sensors) {
      const items2 = grouped[sensor] || [];
      if (items2.length === 0) continue;

      const dp = dataPoints[sensor];
      dp.labels = items2.map(i => formatTime(i.timestamp));
      dp.values = items2.map(i => i.value);
      dp.alerts = items2.map(i => i.alert);

      if (dp.labels.length > maxPoints) {
        const start = dp.labels.length - maxPoints;
        dp.labels = dp.labels.slice(start);
        dp.values = dp.values.slice(start);
        dp.alerts = dp.alerts.slice(start);
      }

      updateChart(sensor);
    }
  } catch (err) {
    // 错误已处理
  }
}

function createAlertElement(alert) {
  const sensorName = labelsMap[alert.sensor_type] || alert.sensor_type;
  const directionText = alert.direction === 'high' ? '过高' : '过低';
  const statusText = {
    active: '进行中',
    resolved: '已恢复',
    device_offline: '设备离线',
    timeout_offline: '超时离线',
    shutdown: '服务关闭'
  }[alert.status] || alert.status;

  const el = document.createElement('div');
  el.className = 'alert-item ' + alert.status;
  el.dataset.id = alert.id;
  el.innerHTML = `
    <div>
      <span class="alert-sensor">${sensorName}</span>
      <span class="alert-direction ${alert.direction}">${directionText}</span>
      <span class="alert-value">${alert.value} ${unitMap[alert.sensor_type] || ''}</span>
    </div>
    <div style="text-align: right;">
      <div class="alert-time">${formatDateTime(alert.started_at)}</div>
      <div class="alert-duration">${statusText} · ${formatDuration(alert.duration)}</div>
    </div>
  `;
  return el;
}

function updateAlertElement(el, alert) {
  const statusText = {
    active: '进行中',
    resolved: '已恢复',
    device_offline: '设备离线',
    timeout_offline: '超时离线',
    shutdown: '服务关闭'
  }[alert.status] || alert.status;

  el.className = 'alert-item ' + alert.status;

  const durEl = el.querySelector('.alert-duration');
  if (durEl) {
    durEl.textContent = statusText + ' · ' + formatDuration(alert.duration);
  }
}

async function loadAlertEvents() {
  try {
    const data = await apiRequest('/api/alerts?limit=30');
    const items = data.items;
    const listEl = document.getElementById('alertsList');

    if (items.length === 0) {
      if (alertCache.size > 0 || lastAlertCount !== 0) {
        listEl.innerHTML = '<div class="no-alerts">暂无告警记录</div>';
        alertCache.clear();
        lastAlertCount = 0;
      }
      return;
    }

    if (alertCache.size === 0) {
      const frag = document.createDocumentFragment();
      for (const alert of items) {
        const el = createAlertElement(alert);
        frag.appendChild(el);
        alertCache.set(alert.id, { alert, el });
      }
      listEl.innerHTML = '';
      listEl.appendChild(frag);
      lastAlertCount = items.length;
      return;
    }

    let changed = false;
    const seenIds = new Set();

    for (const alert of items) {
      seenIds.add(alert.id);
      const cached = alertCache.get(alert.id);

      if (!cached) {
        const el = createAlertElement(alert);
        listEl.insertBefore(el, listEl.firstChild);
        alertCache.set(alert.id, { alert, el });
        changed = true;
      } else {
        const oldStatus = cached.alert.status;
        const oldDuration = cached.alert.duration;
        if (oldStatus !== alert.status || oldDuration !== alert.duration) {
          updateAlertElement(cached.el, alert);
          cached.alert = alert;
          changed = true;
        }
      }
    }

    for (const [id, cached] of alertCache) {
      if (!seenIds.has(id) && cached.alert.status === 'active') {
        cached.el.remove();
        alertCache.delete(id);
        changed = true;
      }
    }

    lastAlertCount = items.length;

    if (changed) {
      const sorted = Array.from(alertCache.entries())
        .sort((a, b) => b[1].alert.started_at - a[1].alert.started_at);
      for (const [id, cached] of sorted) {
        if (cached.el.parentNode !== listEl) {
          listEl.appendChild(cached.el);
        }
      }
    }
  } catch (err) {
    // 错误已处理
  }
}

async function loadConfig() {
  try {
    const data = await apiRequest('/api/config');
    thresholds = data.thresholds;

    const inputMap = {
      temperature: ['tempMin', 'tempMax'],
      humidity: ['humidityMin', 'humidityMax'],
      light: ['lightMin', 'lightMax'],
      soil: ['soilMin', 'soilMax'],
      co2: ['co2Min', 'co2Max']
    };

    for (const sensor of sensors) {
      const [minId, maxId] = inputMap[sensor];
      document.getElementById(minId).value = thresholds[sensor]?.min ?? '';
      document.getElementById(maxId).value = thresholds[sensor]?.max ?? '';
    }
  } catch (err) {
    // 错误已处理
  }
}

async function saveConfig() {
  const inputMap = {
    temperature: ['tempMin', 'tempMax'],
    humidity: ['humidityMin', 'humidityMax'],
    light: ['lightMin', 'lightMax'],
    soil: ['soilMin', 'soilMax'],
    co2: ['co2Min', 'co2Max']
  };

  const newThresholds = {};
  for (const sensor of sensors) {
    const [minId, maxId] = inputMap[sensor];
    const minVal = parseFloat(document.getElementById(minId).value);
    const maxVal = parseFloat(document.getElementById(maxId).value);

    if (!isNaN(minVal) || !isNaN(maxVal)) {
      newThresholds[sensor] = {};
      if (!isNaN(minVal)) newThresholds[sensor].min = minVal;
      if (!isNaN(maxVal)) newThresholds[sensor].max = maxVal;
    }
  }

  try {
    const data = await apiRequest('/api/config', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ thresholds: newThresholds })
    });
    thresholds = data.thresholds;
    showToast('配置已保存');
  } catch (err) {
    // 错误已处理
  }
}

async function init() {
  await loadConfig();
  await loadHistory();
  await loadAlertEvents();
  fetchLatest();
  setInterval(fetchLatest, 2000);
}

init();
</script>
